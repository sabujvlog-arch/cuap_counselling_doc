<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="gold-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="70%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </radialGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="accent-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Ring with Gold Border -->
  <circle cx="100" cy="100" r="96" fill="url(#blue-grad)" stroke="url(#gold-grad)" stroke-width="6" filter="url(#shadow)" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="3 3" />

  <!-- Circular Text Path (Top: CENTRAL UNIVERSITY OF ANDHRA PRADESH) -->
  <path id="text-path-top" d="M 24 100 A 76 76 0 0 1 176 100" fill="none" />
  <text font-family="sans-serif" font-weight="900" font-size="10" fill="#FBBF24" letter-spacing="1.2">
    <textPath href="#text-path-top" startOffset="50%" text-anchor="middle">
      CENTRAL UNIVERSITY OF ANDHRA PRADESH
    </textPath>
  </text>

  <!-- Circular Text Path (Bottom: VIDYA DADATI VINAYAM) -->
  <path id="text-path-bottom" d="M 176 100 A 76 76 0 0 1 24 100" fill="none" />
  <text font-family="sans-serif" font-weight="800" font-size="9.5" fill="#FFFBEB" letter-spacing="1.5">
    <textPath href="#text-path-bottom" startOffset="50%" text-anchor="middle">
      •  VIDYA DADATI VINAYAM  •
    </textPath>
  </text>

  <!-- Inner Gold Circle Divider -->
  <circle cx="100" cy="100" r="62" fill="url(#blue-grad)" stroke="url(#gold-grad)" stroke-width="3" />

  <!-- Inner Content Group -->
  <g>
    <!-- 1. Rising Sun Symbol (top) -->
    <path d="M 68 85 A 32 32 0 0 1 132 85 Z" fill="url(#gold-grad)" />
    <!-- Sun Rays -->
    <g stroke="url(#gold-grad)" stroke-width="2.5" stroke-linecap="round">
      <line x1="100" y1="73" x2="100" y2="61" />
      <line x1="88" y1="76" x2="79" y2="67" />
      <line x1="112" y1="76" x2="121" y2="67" />
      <line x1="78" y1="83" x2="67" y2="80" />
      <line x1="122" y1="83" x2="133" y2="80" />
    </g>

    <!-- 2. Pagoda / Temple Towers (Left & Right - representing Vijayanagara legacy) -->
    <!-- Left Pagoda -->
    <g transform="translate(56, 85) scale(0.6)" fill="#F59E0B" stroke="#92400E" stroke-width="0.5">
      <path d="M 10 30 L 30 30 L 20 10 Z" />
      <path d="M 5 45 L 35 45 L 30 30 L 10 30 Z" />
      <rect x="12" y="45" width="16" height="15" />
    </g>
    <!-- Right Pagoda -->
    <g transform="translate(120, 85) scale(0.6)" fill="#F59E0B" stroke="#92400E" stroke-width="0.5">
      <path d="M 10 30 L 30 30 L 20 10 Z" />
      <path d="M 5 45 L 35 45 L 30 30 L 10 30 Z" />
      <rect x="12" y="45" width="16" height="15" />
    </g>

    <!-- 3. Purna Kalasha (Vase) in the Center -->
    <g transform="translate(90, 84)" fill="url(#accent-gold)">
      <!-- Base/Pedestal -->
      <path d="M 4 28 L 16 28 L 14 31 L 6 31 Z" />
      <!-- Body of Kalash -->
      <path d="M 2 18 C 2 30, 18 30, 18 18 C 18 10, 2 10, 2 18 Z" stroke="#D97706" stroke-width="1" />
      <!-- Neck & Rim -->
      <path d="M 5 11 L 15 11 L 17 8 L 3 8 Z" />
      <!-- Coconut & Leaves on Top -->
      <path d="M 10 1 L 6 8 L 14 8 Z" fill="#D97706" />
      <path d="M 3 8 C 1 4, 7 6, 7 8 Z" fill="#047857" />
      <path d="M 17 8 C 19 4, 13 6, 13 8 Z" fill="#047857" />
    </g>

    <!-- 4. Open Book Symbol (bottom center, overlapping the Kalash pedestal) -->
    <g transform="translate(70, 122)" filter="url(#shadow)">
      <!-- Left Page -->
      <path d="M 5 20 C 15 15, 25 22, 30 22 L 30 7 C 25 7, 15 0, 5 5 Z" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" />
      <!-- Right Page -->
      <path d="M 55 20 C 45 15, 35 22, 30 22 L 30 7 C 35 7, 45 0, 55 5 Z" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" />
      <!-- Book spine/accent -->
      <path d="M 30 7 L 30 23" stroke="#D97706" stroke-width="2" />
      <!-- Horizontal lines indicating text -->
      <line x1="10" y1="9" x2="25" y2="9" stroke="#94A3B8" stroke-width="1" />
      <line x1="8" y1="12" x2="25" y2="12" stroke="#94A3B8" stroke-width="1" />
      <line x1="10" y1="15" x2="22" y2="15" stroke="#94A3B8" stroke-width="1" />
      
      <line x1="50" y1="9" x2="35" y2="9" stroke="#94A3B8" stroke-width="1" />
      <line x1="52" y1="12" x2="35" y2="12" stroke="#94A3B8" stroke-width="1" />
      <line x1="50" y1="15" x2="38" y2="15" stroke="#94A3B8" stroke-width="1" />
    </g>
  </g>
</svg>
